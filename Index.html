<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ĐỒNG HỒ ĐIỆN ONLINE</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    text-align:center;
}

.header{
    background:#1e293b;
    padding:20px;
    font-size:35px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.box{
    background:#1e293b;
    margin:15px auto;
    padding:25px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    box-shadow:0 0 15px #000;
}

.title{
    font-size:25px;
    margin-bottom:15px;
}

.value{
    font-size:45px;
    font-weight:bold;
}

.money{
    background:#16a34a;
}

.reset{
    background:red;
    color:white;
    border:none;
    padding:20px;
    font-size:25px;
    border-radius:15px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="header">
ĐỒNG HỒ ĐIỆN ONLINE
</div>

<div class="container">

<div class="box">
<div class="title">Điện áp</div>
<div class="value" id="voltage">0</div>
</div>

<div class="box">
<div class="title">Dòng điện</div>
<div class="value" id="current">0</div>
</div>

<div class="box">
<div class="title">Công suất</div>
<div class="value" id="power">0</div>
</div>

<div class="box">
<div class="title">Điện năng</div>
<div class="value" id="energy">0</div>
</div>

<div class="box money">
<div class="title">Tiền điện</div>
<div class="value" id="money">0</div>
</div>

<button onclick="resetEnergy()" class="reset">
RESET ĐIỆN NĂNG
</button>

</div>

<script>

const firebaseURL =
"https://mayvl-bf237-default-rtdb.asia-southeast1.firebasedatabase.app/PZEM.json";

async function loadData()
{
    try{

        const response =
        await fetch(firebaseURL);

        const data =
        await response.json();

        document.getElementById("voltage").innerHTML =
        data.Voltage + " V";

        document.getElementById("current").innerHTML =
        data.Current + " A";

        document.getElementById("power").innerHTML =
        data.Power + " W";

        document.getElementById("energy").innerHTML =
        data.Energy + " kWh";

        document.getElementById("money").innerHTML =
        parseInt(data.Money).toLocaleString() + " đ";

    }
    catch(error)
    {
        console.log(error);
    }
}

async function resetEnergy()
{
    await fetch(
    "https://mayvl-bf237-default-rtdb.asia-southeast1.firebasedatabase.app/PZEM/Reset.json",
    {
        method:"PUT",
        body:"1"
    });

    alert("Đã gửi lệnh reset");
}

loadData();

setInterval(loadData, 3000);

</script>

</body>
</html>
